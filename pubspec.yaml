name: siperpus_pro
description: Sistem Informasi Perpustakaan Digital - SIPERPUS PRO
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.0
  sqflite: ^2.2.8+4
  path: ^1.8.3
  intl: ^0.19.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  lottie: ^2.4.0
  fl_chart: ^0.63.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.5
  permission_handler: ^11.4.4
  mobile_scanner: ^4.1.1
  pdf: ^3.10.8
  printing: ^5.11.3
  excel: ^2.1.0
  intl_utils: ^2.8.5
  connectivity_plus: ^5.0.0
  shared_preferences: ^2.2.2
  dotted_border: ^2.1.0
  table_calendar: ^3.0.9
  animations: ^2.0.7
  flutter_animate: ^4.2.0
  uuid: ^4.0.0
  get_storage: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
